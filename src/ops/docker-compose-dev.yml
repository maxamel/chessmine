name: chessmine
services:
    redis:
        container_name: "redis"
        build:
          context: ../redis
          dockerfile: Dockerfile
        command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
        environment:
          REDIS_PASSWORD: ${REDIS_PASSWORD}
        volumes:
          - ../redis/:/usr/app
        deploy:
          resources:
            limits:
              cpus: '0.10'
              memory: 100M
    redis_exporter:
      container_name: "redis_exporter"
      image: "oliver006/redis_exporter:alpine"
      privileged: true
      environment:
        REDIS_ADDR: "redis"
        REDIS_PASSWORD: ${REDIS_PASSWORD}
      depends_on:
        - redis
    game_server:
        deploy:
          replicas: 2
          endpoint_mode: dnsrr
          resources:
            limits:
              cpus: '0.30'
              memory: 200M
        build:
          context: ../backend/game_server
          dockerfile: Dockerfile
        environment:
          REDIS_URL: redis
          REDIS_PASSWORD: ${REDIS_PASSWORD}
          KUMA_PUSH_URL: http://uptime-kuma:3001/api/push/${KUMA_BACKEND_PUSH_TOKEN}
          KUMA_ALERT_DEDUPE_SECS: "3600"
        volumes:
          - ../backend/game_server/:/usr/app
        depends_on:
          - redis
    operator:
      build:
        context: ../backend/operator
        dockerfile: Dockerfile
      environment:
        SERVER_ADDR: "game_server"
        REDIS_ADDR: "redis"
        REDIS_PASSWORD: ${REDIS_PASSWORD}
      volumes:
        - ../backend/operator/:/usr/app
      depends_on:
        - game_server
    caddy:
        container_name: "caddy"
        init: true  # to teardown zombie healthcheck processes
        build:
          context: ../frontend
          dockerfile: Dockerfile
          args:
            APP_URL: localhost:1443
            TLS_CONFIG: internal
            BE_URL: game_server
        ports:
          - 1443:1443
        depends_on:
          - game_server
    cadvisor:
        container_name: "cadvisor"
        image: "gcr.io/cadvisor/cadvisor:latest"
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock:ro
          - /sys:/sys:ro
          - /var/lib/docker/:/var/lib/docker:ro
        privileged: true
        depends_on:
          - caddy
    prometheus:
        container_name: "prometheus"
        image: "prom/prometheus:latest"
        volumes:
          - ./prometheus.yml:/etc/prometheus/prometheus.yml
          - ./targets.json:/etc/prometheus/targets.json
        privileged: true
        depends_on:
          - cadvisor
    grafana:
        container_name: "grafana"
        image: "grafana/grafana:latest"
        environment:
          - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
          - DS_PROMETHEUS=prometheus
        volumes:
          - ./datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
          - ./dashboard.json:/var/lib/grafana/dashboards/dashboard.json
          - ./redis_dashboard.json:/var/lib/grafana/dashboards/redis_dashboard.json
          - ./default.yml:/etc/grafana/provisioning/dashboards/default.yml
        ports:
          # Loopback-only — NOT reachable from public internet.
          # Access via SSH tunnel: ssh -L 3000:127.0.0.1:3000 user@server
          - "127.0.0.1:3000:3000"
        privileged: true
        depends_on:
          - prometheus
    uptime-kuma:
        container_name: "uptime-kuma"
        image: "louislam/uptime-kuma:1"
        volumes:
          - uptime-kuma-data:/app/data
        ports:
          - "127.0.0.1:3001:3001"
        restart: unless-stopped
        healthcheck:
          test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))"]
          interval: 5s
          timeout: 3s
          retries: 15
          start_period: 30s
        depends_on:
          - caddy
    kuma-bootstrap:
        container_name: "kuma-bootstrap"
        build:
          context: ./kuma-bootstrap
        environment:
          KUMA_URL: http://uptime-kuma:3001
          KUMA_USERNAME: ${KUMA_USERNAME}
          KUMA_PASSWORD: ${KUMA_PASSWORD}
          APP_HOST: localhost:1443
          APP_SCHEME: https
          APP_MONITOR_URL: http://caddy:2019/config/
          ENABLE_TLS_MONITOR: "false"
          TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
          TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
          KUMA_SANITY_PUSH_TOKEN: ${KUMA_SANITY_PUSH_TOKEN}
          KUMA_BACKEND_PUSH_TOKEN: ${KUMA_BACKEND_PUSH_TOKEN}
        restart: "no"
        depends_on:
          uptime-kuma:
            condition: service_healthy

volumes:
    uptime-kuma-data:
