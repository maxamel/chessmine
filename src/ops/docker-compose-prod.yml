name: chessmine
services:
    redis:
        container_name: "redis"
        build:
          context: ../redis
          dockerfile: Dockerfile
        command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
        environment:
          REDIS_PASSWORD: ${REDIS_PASSWORD}
        volumes:
          - ../redis/:/usr/app
        deploy:
          resources:
            limits:
              cpus: '0.10'
              memory: 100M
    redis_exporter:
      container_name: "redis_exporter"
      image: "oliver006/redis_exporter:alpine"
      privileged: true
      environment:
        REDIS_ADDR: "redis"
        REDIS_PASSWORD: ${REDIS_PASSWORD}
      depends_on:
        - redis
    game_server:
        image: ewr.vultrcr.com/chessmine/game_server:curr
        pull_policy: always
        deploy:
          replicas: 3
          endpoint_mode: dnsrr
          resources:
            limits:
              cpus: '0.30'
              memory: 200M
        build:
          context: ../backend/game_server
          dockerfile: Dockerfile
          tags:
            - "game_server:curr"
        environment:
          REDIS_URL: redis
          REDIS_PASSWORD: ${REDIS_PASSWORD}
          TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
          TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
        depends_on:
          - redis
    operator:
      image: ewr.vultrcr.com/chessmine/operator:curr
      pull_policy: always
      build:
        context: ../backend/operator
        dockerfile: Dockerfile
        tags:
          - "operator:curr"
      environment:
        SERVER_ADDR: "game_server"
        REDIS_ADDR: "redis"
        REDIS_PASSWORD: ${REDIS_PASSWORD}
      volumes:
        - ../backend/operator/:/usr/app
      depends_on:
        - game_server
    caddy:
        container_name: "caddy"
        image: ewr.vultrcr.com/chessmine/frontend:curr
        pull_policy: always
        init: true  # to teardown zombie healthcheck processes
        build:
          context: ../frontend
          dockerfile: Dockerfile
          tags:
            - "frontend:curr"
          args:
            APP_URL: chessmine.xyz
            TLS_CONFIG: chessmine500@protonmail.com
            BE_URL: game_server
        ports:
          - 443:443
          - 80:80
        depends_on:
          - game_server
    cadvisor:
        container_name: "cadvisor"
        image: "gcr.io/cadvisor/cadvisor:latest"
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock:ro
          - /sys:/sys:ro
          - /var/snap/docker/common/var-lib-docker:/var/snap/docker/common/var-lib-docker:ro
        privileged: true
        depends_on:
          - caddy
    prometheus:
        container_name: "prometheus"
        image: "prom/prometheus:latest"
        volumes:
          - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
          - ./prometheus/targets.json:/etc/prometheus/targets.json
        privileged: true
        depends_on:
          - cadvisor
    grafana:
        container_name: "grafana"
        image: "grafana/grafana:latest"
        environment:
          - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
          - DS_PROMETHEUS=prometheus
          - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
        volumes:
          - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
          - ./grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json
          - ./grafana/redis_dashboard.json:/var/lib/grafana/dashboards/redis_dashboard.json
          - ./grafana/default.yml:/etc/grafana/provisioning/dashboards/default.yml
          - ./grafana/alerting/contactpoints.yaml:/etc/grafana/provisioning/alerting/contactpoints.yaml
          - ./grafana/alerting/policies.yaml:/etc/grafana/provisioning/alerting/policies.yaml
          - ./grafana/alerting/rules.yaml:/etc/grafana/provisioning/alerting/rules.yaml
        ports:
          # Loopback-only — NOT reachable from public internet.
          # Access via SSH tunnel: ssh -L 3000:127.0.0.1:3000 user@server
          - "127.0.0.1:3000:3000"
        privileged: true
        depends_on:
          - prometheus
