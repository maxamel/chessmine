global:
  scrape_interval: 15s #Scrape interval to every 15 seconds.
  evaluation_interval: 15s #Evaluate rules every 15 seconds.

scrape_configs:
  - job_name: "prometheus"
    # metrics_path defaults to '/metrics'
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: caddy
    static_configs:
      - targets: ['caddy:2019']

  - job_name: game_server
    file_sd_configs:
      - files:
          - 'targets.json'

  - job_name: redis_exporter
    static_configs:
      - targets: [ 'redis_exporter:9121' ]

  # Uptime Kuma exposes Prometheus metrics at /metrics on port 3001.
  # No API key is needed: the bootstrap creates no API keys, so Kuma serves
  # /metrics without auth.  The endpoint is Docker-internal only (no external
  # access), so this is safe.
  - job_name: uptime_kuma
    static_configs:
      - targets: [ 'uptime-kuma:3001' ]
    metrics_path: /metrics