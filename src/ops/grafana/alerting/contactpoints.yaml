apiVersion: 1

contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram-receiver
        type: telegram
        settings:
          botToken: ${TELEGRAM_BOT_TOKEN}
          chatid: ${TELEGRAM_CHAT_ID}
          message: |
            {{ range .Alerts }}
            🚨 *{{ .Labels.alertname }}*
            {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ end }}
            {{ if .Annotations.description }}{{ .Annotations.description }}{{ end }}
            Status: {{ .Status }}
            {{ end }}
        disableResolveMessage: false
