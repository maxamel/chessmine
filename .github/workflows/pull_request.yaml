---
name: Pull Request
on:
  pull_request:
    branches:
    - "master"
permissions: read-all
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libcurl4-gnutls-dev libffi-dev libssl-dev build-essential curl
          find /usr -name 'curl.h'
      - uses: actions/checkout@v2
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Build
        uses: py-actions/py-dependency-install@30aa0023464ed4b5b116bd9fbdab87acf01a484e
        with:
          path: "src/backend/game_server/requirements.txt"
      - name: Additional Dependencies
        run: pip install websocket-client
      - name: Prepare Lua (5.2 to match operator image woahbase/alpine-lua:5.2.4)
        uses: leafo/gh-actions-lua@35bcb06abec04ec87df82e08caa84d545348536e
        with:
          luaVersion: "5.2"
      - name: Luarocks
        uses: leafo/gh-actions-luarocks@e65774a6386cb4f24e293dca7fc4ff89165b64c5
      - name: Install lua modules (pinned to match operator Dockerfile; Lua 5.2)
        run: |
          luarocks install luacov
          luarocks install luaunit
          luarocks install redis-lua 2.0.4-1
          luarocks install milua 0.3-0
          luarocks install lunajson 1.2.3-1
          luarocks install Lua-cURL 0.3.13-1 CURL_INCDIR=/usr/include/x86_64-linux-gnu
      - name: Start Redis with password
        run: |
          docker run -d --name redis -p 6379:6379 redis:7.4.0-alpine redis-server --requirepass "$REDIS_PASSWORD"
          for i in $(seq 1 15); do
            docker exec redis redis-cli -a "$REDIS_PASSWORD" ping && break || sleep 2
          done
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      - name: Luacov
        run: lua -lluacov src/backend/game_server/src/lua/test_match.lua
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      - name: Start Game Server
        working-directory: src/backend/game_server/
        run: python src/app.py &
        env:
          LOG_PATH: server.log
          REDIS_URL: localhost
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      - name: Start Operator
        working-directory: src/backend/operator/
        run: lua src/app.lua &
        env:
          REDIS_ADDR: localhost
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install NPM dependencies
        working-directory: src/frontend/
        run: npm install
      - name: Test Client Connection
        working-directory: src/frontend/
        run: npm test
      - name: Test Backend
        working-directory: src/backend/game_server/test/
        run: python -m unittest discover -v -s ./  -p 'test_*.py'
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      - name: Test with Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@e983355829b735cff43000af6158aac9f7b4a7da
