---
name: Deploy to Production
on:
  push:
    branches:
      - master
permissions: read-all
jobs:
  prepare-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download MaxMind GeoLite2-Country Database
        env:
          MMDB_LICENSE: ${{ secrets.MMDB_LICENSE }}
        run: |
          curl -L "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country&license_key=$MMDB_LICENSE&suffix=tar.gz" -o GeoLite2-Country.tar.gz
          tar -xzf GeoLite2-Country.tar.gz
          find . -name "GeoLite2-Country.mmdb" -exec cp -f {} src/backend/game_server/src/GeoLite2-Country.mmdb \;
          rm -rf GeoLite2-Country.tar.gz GeoLite2-Country_*

      - name: Build, Tag, and Push Images
        run: |
          # Ensure your script uses the Vultr Registry URL for tagging
          cd ./src/ops/
          chmod +x ./prepare_images.sh
          ./prepare_images.sh
        env:
          registry_url: ${{ secrets.VULTR_REGISTRY_URL }}
          registry_username: ${{ secrets.VULTR_USERNAME }}
          registry_password: ${{ secrets.VULTR_API_KEY }}

  deploy:
    needs: prepare-images
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: REDIS_PASSWORD
          script: |
            cd ~/chessmine || exit
            
            # Update the code on the server
            git pull origin master
            
            docker login ${{ secrets.VULTR_REGISTRY_URL }} -u ${{ secrets.VULTR_USERNAME }} -p ${{ secrets.VULTR_API_KEY }}

            cd ./src/ops/
            chmod +x spin_up.sh
            REDIS_PASSWORD="$REDIS_PASSWORD" ./spin_up.sh prod soft
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}